volumes:
  gemini_config:
  postgres_data:

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: roadmapper
      POSTGRES_PASSWORD: roadmapper
      POSTGRES_DB: roadmapper
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadmapper"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  orchestrator:
    build: .
    profiles:
      - cli
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://roadmapper:roadmapper@postgres:5432/roadmapper
    volumes:
      - ~/.gemini/:/mnt/host-gemini:ro
      - gemini_config:/home/appuser/.gemini
      - .:/codebase:ro
      - ./output:/output

  gui:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://roadmapper:roadmapper@postgres:5432/roadmapper
    volumes:
      - gemini_config:/home/appuser/.gemini
    command: streamlit run gui/app.py
